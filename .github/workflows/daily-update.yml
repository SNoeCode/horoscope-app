name: Daily Horoscope Update

on:
  schedule:
    - cron: '0 10 * * *'  # Runs every day at 10:00 UTC (5:00 AM ET)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-horoscopes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape and convert horoscopes
        run: python scripts/update_horoscopes.py

      - name: Commit updated horoscope data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vite-project/public/horoscope.json
          git diff --cached --quiet || git commit -m "chore: update daily horoscopes $(date +'%Y-%m-%d')"
          git push

      - name: Trigger Netlify deploy
        run: curl -X POST -d {} https://api.netlify.com/build_hooks/683f3e79e327481abbe8a5f7
